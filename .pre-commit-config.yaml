repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Cargo fmt
        entry: cargo fmt -- --check
        language: system
        pass_filenames: false
        files: \\.rs$
        stages: [pre-commit]

      - id: cargo-clippy
        name: Cargo clippy
        entry: cargo clippy --workspace -- -D warnings
        language: system
        pass_filenames: false
        files: \\.rs$
        stages: [pre-commit]

      - id: cargo-check
        name: Cargo check
        entry: cargo check --workspace
        language: system
        pass_filenames: false
        files: \\.rs$
        stages: [pre-commit]

      - id: cargo-test
        name: Cargo test
        entry: cargo test --workspace
        language: system
        pass_filenames: false
        files: \\.rs$
        stages: [pre-commit]
